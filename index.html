<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/common/logo.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#3eaf7c" />
    <title>前端知识体系</title>
    <style>
      #global-loading {
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        height: 100vh;
        gap: 16px;
      }
      .spinner {
        width: 40px;
        height: 40px;
        border: 3px solid #e2e2e3;
        border-top-color: #3eaf7c;
        border-radius: 50%;
        animation: spin 0.8s linear infinite;
      }
      .dark .spinner {
        border-color: #333355;
        border-top-color: #4ec9b0;
      }
      .loading-text {
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        font-size: 0.9rem;
        color: #888;
      }
      @keyframes spin {
        to { transform: rotate(360deg); }
      }
    </style>
    <script>
      (function() {
        var saved = localStorage.getItem('theme');
        var prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
        if (saved === 'dark' || (!saved && prefersDark)) {
          document.documentElement.classList.add('dark');
        }
      })();
    </script>
    <script type="module" crossorigin src="/common/assets/index-CeWfRK1v.js"></script>
    <link rel="modulepreload" crossorigin href="/common/assets/rolldown-runtime-QTnfLwEv.js">
    <link rel="modulepreload" crossorigin href="/common/assets/vendor-CG4hBFYv.js">
    <link rel="stylesheet" crossorigin href="/common/assets/index-CqFHKzdc.css">
  </head>
  <body>
    <div id="root">
      <div id="global-loading">
        <div class="spinner"></div>
        <div class="loading-text">加载中...</div>
      </div>
    </div>
  </body>
</html>
