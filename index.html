    <style>
      .shape-two {
        position: relative;
        width: 0;
        height: 0;

        border: 60px solid #f1d565;
        border-right: 60px solid transparent;
        border-radius: 100%;
      }

      .shape-two::after {
        content: " ";
        border: 8px solid #f1d565;
        border-radius: 50%;
        position: absolute;
        right: -50px;
        top: -10px;
      }
      .shape-two::before {
        content: " ";
        border: 8px solid #000000;
        border-radius: 50%;
        position: absolute;
        right: -20px;
        top: -45px;
      }
      .shape-one {
        /* 八角星：两个正方形，旋转角度 */
        width: 100px;
        height: 100px;
        margin-left: 100px;
        margin-top: 100px;
        background: #eb3223;
        position: relative;
      }
      .shape-one:before {
        content: "";
        width: 100px;
        height: 100px;
        background: #eb3223;
        position: absolute;
        top: 0;
        left: 0;
        transform: rotate(45deg);
      }
    </style>
    <!-- <div class="shape-two"></div> -->
    <div class="shape-one"></div>
    <script>
      source = [
        { id: 1, pid: 0 },
        { id: 2, pid: 0 },
        { id: 3, pid: 1 },
        { id: 4, pid: 1 },
        { id: 5, pid: 2 },
        { id: 6, pid: 5 },
        { id: 7, pid: 6 },
      ];
 function handleArrToParentAndSon (srcArr) {
    // 初始化结果数组，并判断输入数据的格式
    let result = []
    if (!Array.isArray(srcArr)) {
        return result
    }
    // 使用map，将当前对象的id与当前对象对应存储起来
    let map = {};
    srcArr.forEach(item => {
        map[item.id] = item;
    });
    srcArr.forEach(item => {
        let parent = map[item.pid];
        if (parent) {
            (parent.son || (parent.son = [])).push(item);
        } else {
            result.push(item);
        }
    });
    return result;
}

      console.log(handleArrToParentAndSon(source));
    </script>
