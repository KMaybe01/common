<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>css上中下布局使用flex布局，这个时候父元素一定要给高度</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            /* 父元素一定要给高度 */
            height: 100vh;
        }

        .top {
            width: 100%;
            height: 100px;
            background: red;
        }

        .center {
            width: 100%;
            flex: 1;
            background: yellow;
        }

        .bottom {
            width: 100%;
            height: 100px;
            background: red;
        }
    </style>
</head>

<body>
    <div class="top"></div>
    <div class="center"></div>
    <div class="bottom"></div>
</body>

</html>
