<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>css上中下布局利用css定位属性</title>
    <style>
        body {
            margin: 0;
            padding: 0;
        }

        .top {
            position: absolute;
            top: 0;
            width: 100%;
            height: 100px;
            background: red;
        }

        .center {
            position: absolute;
            top: 100px;
            bottom: 100px;
            width: 100%;
            height: auto;
            background: yellow;
        }

        .bottom {
            position: absolute;
            height: 100px;
            width: 100%;
            bottom: 0;
            background: red;
        }
    </style>
</head>

<body>
    <div class="top"></div>
    <div class="center"></div>
    <div class="bottom"></div>
</body>

</html>
