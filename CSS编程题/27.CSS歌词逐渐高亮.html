<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <title>Title</title>
</head>

<body>
    <canvas id="canvas" width="400" height="300"></canvas>
</body>

<script>
    (function () {
        let curX = -400,
            speed = 1;
        const text = '京程一灯';
        const canvas = document.getElementById('canvas');
        let ctx = canvas.getContext('2d');

        function clearCanvas() {
            ctx.clearRect(0, 0, 400, 300);
        }

        function render() {
            clearCanvas(); // 清除canvas

            ctx.save();
            ctx.font = '50px 宋体';
            ctx.fillStyle = 'black';
            ctx.fillText(text, 80, 250);
            ctx.restore();

            ctx.save();
            ctx.beginPath();
            curX += speed;
            ctx.rect(curX, 0, 400, 300);
            ctx.closePath();
            ctx.clip(); // 截取矩形区域

            ctx.font = '50px 宋体';
            ctx.fillStyle = 'red';
            ctx.fillText(text, 80, 250); // 绘制该区域内文字样式
            ctx.restore();

            // curX为0，回调结束
            if (curX < 0) {
                requestAnimationFrame(render);
            }
        }
        render();
    })();
</script>

</html>
