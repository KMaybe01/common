<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<style>
    * {
        margin: 0;
        padding: 0;
    }

    .box {
        height: 100vh;
        display: flex;
        flex-direction: column;
    }

    .div1 {
        flex: 1 50%;
        background-color: red;
    }

    .div2 {
        flex: 1 50%;
        display: flex;
    }

    .div3 {
        background-color: green;
        flex: 1;
    }

    .div4 {
        background-color: blue;
        flex: 1;
    }
</style>

<body>
    <div class="box">
        <div class="div1"></div>
        <div class="div2">
            <div class="div3"></div>
            <div class="div4"></div>
        </div>
    </div>
</body>

</html>
