<!-- 浮动布局 -->
<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">
    <title>浮动布局</title>
    <style>
        html,
        body {
            width: 100%;
            height: 100%;
            margin: 0;
            padding: 0;
        }

        .main {
            height: 100%;
            margin: 0 100px;
            background: blue;
        }

        .left {
            float: left;
            width: 100px;
            height: 100%;
            background: red;
        }

        .right {
            width: 100px;
            height: 100%;
            background: red;
            float: right;
        }
    </style>
</head>

<body>
    <div class="left"></div>
    <div class="right"></div>
    <div class="main"></div>
</body>

</html>
