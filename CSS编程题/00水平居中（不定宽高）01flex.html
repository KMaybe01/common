<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>不定宽居中布局</title>

</head>

<body>
    <style>
        .children-box {
            background: yellow;
        }

        .wrapper {
            width: 300px;
            height: 300px;
            background-color: salmon;
            position: absolute;
            top: 0;
            left: 0;
            bottom: 0;
            right: 0;
            margin: auto;
        }

        .flex-center {
            display: flex;
            justify-content: center;
            align-items: center;
        }
    </style>
    <div class="wrapper flex-center">
        <div class="children-box">不定宽布局，flex</div>
    </div>






</body>

</html>
