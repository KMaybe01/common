<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>文字逐个打印</title>
    <style type="text/css">
        #shi {
            font-size: 25px;
            color: #09F;
            height: 25px;
            font-weight: bold;
            width: 500px;
            text-align: center;
        }
    </style>


</head>

<body>
    <div id="wai" style="width:0px; height:30px; overflow:hidden">
        <div id="shi">安得广厦千万间，大庇天下寒士俱欢颜</div>
    </div>
</body>
<script type="text/javascript">
    showshi();

    function showshi() {
        var s = document.getElementById("wai");
        if (parseInt(s.style.width) < 500) {
            var w = parseInt(s.style.width) + 1;
            s.style.width = w + "px";
            window.setTimeout("showshi()", 20);
        }
    }
</script>

</html>
