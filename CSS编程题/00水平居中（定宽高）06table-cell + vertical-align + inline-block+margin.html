<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>

<body>
    <style type="text/css">
        .box {
            width: 200px;
            height: 200px;
            border: 1px solid red;
            display: table-cell;
            text-align: center;
            vertical-align: middle;
        }

        .children-box {
            width: 100px;
            height: 100px;
            background: yellow;
            display: inline-block; 
            /* 可以换成margin: auto; */
        }
    </style>
    <div class="box">
        <div class="children-box"></div>
    </div>
</body>

</html>
