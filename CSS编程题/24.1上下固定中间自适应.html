<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>css上中下布局利用css中vh单位和calc() 函数</title>
    <style>
        body {
            margin: 0;
            padding: 0;
        }

        .top {
            height: 100px;
            background: red;
        }

        .center {
            height: calc(100vh - 200px);
            background: yellow;
        }

        .bottom {
            height: 100px;
            background: red;
        }
    </style>
</head>

<body>
    <div class="top"></div>
    <div class="center"></div>
    <div class="bottom"></div>
</body>

</html>
