


<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>自适应正方形</title>
  </head>
  <body>
<!-- 方法一：
使用CSS3 vw单位,在CSS3中增加了一系列相对于视窗区域百分比的单位：vw、vh。
其中vw是相对于视窗区域宽度百分比的单位，1vw = 1% viewport width。vh是相对于视窗区域高度百分比的单位
1vh = 1% viewport height。使用这个单位可以很方便的做出自适应正方形。
 -->

    <div class="square">方法一 使用vw</div>
    <style>
      .square {
        width: 50%;
        height: 50vw;
        background: red;
        margin: 0 auto;
      }
    </style>
<!-- 方法二：
     设置垂直方向的padding撑开容器(padding可以用百分比，百分比是根据它包含块的width来确定的，也就是父级元素的width）
-->

    <div class="square2">方法二 设置垂直方向的padding</div>
    <style>
      .square2 {
        width: 50%;
        height: 0;
        padding-bottom: 50%;
        margin: 0 auto;
        background: brown;
      }
    </style>
    
<!-- 方法三：
利用伪元素的 margin(padding)-top 撑开容器
在方案二中，我们利用百分比数值的 padding-bottom 属性撑开容器内部空间，但是这样做会导致在元素上设置的 max-height 属性失效
而失效的原因是 max-height 属性只限制于 height，也就是只会对元素的 content height 起作用。由于容器与伪元素在垂直方向发生了外边距折叠，
所以我们想象中的撑开父元素高度并没有出现。而应对的方法是在父元素上触发 BFC. 
-->
    <div class="square3">方法三 通过设置伪元素的margin</div>
    <style>
      .square3 {
        width: 50%;
        overflow: hidden;
        margin: 0 auto;
        background: burlywood;
      }
      .square3:after {
        content: "";
        display: block;
        margin-top: 100%; /* margin 百分比相对父元素宽度计算 */
      }
      
    </style>
  </body>
</html>
