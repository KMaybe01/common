<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <title></title>
    <style>
      /*------------------------公共样式表----------------------------*/
      * {
        margin: 0px;
        padding: 0px;
        border: 0px;
      }
      a {
        text-decoration: none;
      }
      .center-all {
        display: flex;
        justify-content: center;
        align-items: center;
      }
      .center-align {
        display: flex;
        align-items: center;
      }
      .center-justify {
        display: flex;
        justify-content: center;
      }
      .center-spacearound {
        display: flex;
        align-items: center;
        justify-content: space-around;
      }

      /*------------------------本项目公共样式----------------------------*/
      #container {
        width: 800px;
        height: 400px;
        margin: 0 auto;
        padding-top: 30px;
        box-sizing: border-box;
        /*background-color: yellow;*/
      }

      /*搜索栏*/
      .sea-container {
        width: 450px;
        height: 30px;
        background-color: green;
        margin: 100px auto;
        border: 1px solid #317ef3;
      }
      .blue-input {
        float: left;
        width: 350px;
        height: 30px;
        padding: 0 10px;
        box-sizing: border-box;
      }
      .blue-button {
        width: 100px;
        height: 30px;
        background-color: #317ef3;
        color: white;
        font-size: 15px;
      }

      /* 搜索下拉框*/
      ul#drop {
        list-style: none;
        margin: 0;
        padding: 0;
      }
      ul#drop li {
        margin: 0;
        padding: 10px;
      }

      ul#drop li:hover {
        background-color: darkgrey;
        width: 200px;
      }

      p#selectedId {
        display: inline-block;
      }
    </style>
    <script>
      var arr = [
        "中国",
        "日本",
        "美国",
        "俄罗斯",
        "加拿大",
        "英国",
        "澳大利亚",
        "西班牙",
        "德国",
        "孟买加",
        "阿拉伯",
        "印度",
        "印度尼西亚",
      ];
      var search = document.getElementsByClassName("blue-input")[0];
      var selectedId = document.getElementById("selectedId");

      function showList() {
        var res = searchByIndexOf(search.value, arr);
        for (var i = 0; i < res.length; i++) {
          var li = document.createElement("li");
          li.innerHTML = res[i];
          document.getElementById("drop").appendChild(li);
        }
      }

      search.oninput = function getMoreContents() {
        //删除ul
        var drop = document.getElementById("drop");
        selectedId.removeChild(drop);
        //把ul添加回来
        var originalUl = document.createElement("ul");
        originalUl.id = "drop";
        selectedId.appendChild(originalUl);

        showList();
      };

      // 添加获取焦点事件
      search.onfocus = function () {
        // 初始下拉列表
        var originalUl = document.createElement("ul");
        originalUl.id = "drop";
        selectedId.appendChild(originalUl);
        showList();
      };

      //添加失去焦点事件
      search.onblur = function () {
        //	console.log("soutsout")
        var drop = document.getElementById("drop");
        selectedId.removeChild(drop);
      };

      //模糊查询:利用字符串的indexOf方法
      function searchByIndexOf(keyWord, list) {
        if (!(list instanceof Array)) {
          return;
        }
        if (keyWord == "") {
          return [];
        } else {
          var len = list.length;
          var arr = [];
          for (var i = 0; i < len; i++) {
            //如果字符串中不包含目标字符会返回-1
            if (list[i].indexOf(keyWord) >= 0) {
              arr.push(list[i]);
            }
          }
          return arr;
        }
      }

      //正则匹配
      /*function searchByRegExp(keyWord, list){
    if(!(list instanceof Array)){
        return ;
    }
    var len = list.length;
    var arr = [];
    var reg = new RegExp(keyWord);
    for(var i=0;i<len;i++){
        //如果字符串中不包含目标字符会返回-1
        if(list[i].match(reg)){
            arr.push(list[i]);
        }
    }
    return arr;
}*/
    </script>
  </head>
  <body>
    <div id="container" class="center-justify">
      <div class="sea-container">
        <form action="">
          <input type="text" name="search" class="blue-input" />
          <input type="submit" value="搜索" class="blue-button" />
        </form>
        <p id="selectedId"></p>
      </div>
    </div>
  </body>
</html>
